name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Type-check
        # mypy strict only on hand-written code; generated _generated/ (if added later) is excluded via pyproject.
        run: mypy src/lenz_io
      - name: Test
        run: pytest -q
