name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (py${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check .
      - name: Type-check
        # mypy strict only on hand-written code; generated _generated/ (if added later) is excluded via pyproject.
        run: mypy src/lenz_io
      - name: Test
        run: pytest -q

  cli-wheel-smoke:
    name: cli wheel smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs tags to resolve a version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Install the built wheel with the [cli] extra in a clean venv
        run: |
          python -m venv /tmp/wheelenv
          /tmp/wheelenv/bin/pip install "$(ls dist/*.whl)[cli]"
      - name: Entry point resolves (a broken console_script can never publish)
        run: |
          /tmp/wheelenv/bin/lenz --version
          # No-key extract must be a friendly error + nonzero, not a traceback.
          /tmp/wheelenv/bin/lenz --json extract "x" && exit 1 || test $? -eq 1
      - name: Bare install (no extra) nudges instead of crashing
        run: |
          python -m venv /tmp/bareenv
          /tmp/bareenv/bin/pip install "$(ls dist/*.whl)"
          /tmp/bareenv/bin/lenz 2>/tmp/err.txt && exit 1 || true
          grep -q 'lenz-io\[cli\]' /tmp/err.txt
